[program:imagecli_gen]
command=%(ENV_HOME)s/projects/imageCLI/supervisor/scripts/run_gen.sh
directory=%(ENV_HOME)s/projects/imageCLI
environment=HOME="%(ENV_HOME)s",PATH="%(ENV_HOME)s/.local/bin:%(ENV_HOME)s/projects/imageCLI/.venv/bin:/usr/local/bin:/usr/bin:/bin"
autostart=false
autorestart=true
startsecs=20
startretries=3
stopwaitsecs=30
stopasgroup=true
killasgroup=true
stdout_logfile=%(ENV_HOME)s/.local/state/imagecli/logs/imagecli_gen.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=3
stderr_logfile=%(ENV_HOME)s/.local/state/imagecli/logs/imagecli_gen_error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3
